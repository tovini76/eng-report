<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 영어 교과학습발달상황 통합 관리 시스템</title>
    <style>
        :root { 
            --primary: #1e293b; 
            --grade3: #10b981; /* 3학년 초록 */
            --grade4: #3b82f6; /* 4학년 파랑 */
            --grade5: #f59e0b; /* 5학년 주황 */
            --grade6: #8b5cf6; /* 6학년 보라 */
            --bg: #f8fafc; 
        }
        * { box-sizing: border-box; text-decoration: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 30px 15px; color: #334155; }
        
        .container { max-width: 1000px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--primary); font-size: 2rem; margin-bottom: 10px; letter-spacing: -1px; }
        .header p { color: #64748b; font-size: 1.1rem; margin: 0; }

        /* 그리드 레이아웃: PC에서는 2줄로, 모바일에서는 1줄로 */
        .grade-grid { display: grid; gap: 20px; grid-template-columns: 1fr; }
        @media (min-width: 600px) { .grade-grid { grid-template-columns: 1fr 1fr; } }

        .grade-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .grade-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        
        .grade-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        
        /* 학년별 테마 색상 적용 */
        .g3 { border-top: 8px solid var(--grade3); } .g3 .grade-title { color: var(--grade3); }
        .g4 { border-top: 8px solid var(--grade4); } .g4 .grade-title { color: var(--grade4); }
        .g5 { border-top: 8px solid var(--grade5); } .g5 .grade-title { color: var(--grade5); }
        .g6 { border-top: 8px solid var(--grade6); } .g6 .grade-title { color: var(--grade6); }

        .btn-group { display: flex; gap: 15px; }
        .btn { flex: 1; text-align: center; padding: 16px 10px; border-radius: 12px; font-weight: 800; font-size: 1.05rem; transition: 0.3s; color: white; }
        
        .btn-3 { background: #d1fae5; color: #047857; border: 1px solid #a7f3d0; } .btn-3:hover { background: var(--grade3); color: white; }
        .btn-4 { background: #dbeafe; color: #1d4ed8; border: 1px solid #bfdbfe; } .btn-4:hover { background: var(--grade4); color: white; }
        .btn-5 { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; } .btn-5:hover { background: var(--grade5); color: white; }
        .btn-6 { background: #ede9fe; color: #6d28d9; border: 1px solid #ddd6fe; } .btn-6:hover { background: var(--grade6); color: white; }
        
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏫 초등 영어 생기부 관리 허브</h1>
        <p>2022 개정 교육과정 기준 학년별/학기별 평가 시스템</p>
    </div>

    <div class="grade-grid">
        
        <div class="grade-card g3">
            <div class="grade-title"><span>3학년 (3rd Grade)</span> 🎒</div>
            <div class="btn-group">
                <a href="grade3_1.html" class="btn btn-3">1학기 평가</a>
                <a href="grade3_2.html" class="btn btn-3">2학기 평가</a>
            </div>
        </div>

        <div class="grade-card g4">
            <div class="grade-title"><span>4학년 (4th Grade)</span> 📘</div>
            <div class="btn-group">
                <a href="grade4_1.html" class="btn btn-4">1학기 평가</a>
                <a href="grade4_2.html" class="btn btn-4">2학기 평가</a>
            </div>
        </div>

        <div class="grade-card g5">
            <div class="grade-title"><span>5학년 (5th Grade)</span> 📙</div>
            <div class="btn-group">
                <a href="grade5_1.html" class="btn btn-5">1학기 평가</a>
                <a href="grade5_2.html" class="btn btn-5">2학기 평가</a>
            </div>
        </div>

        <div class="grade-card g6">
            <div class="grade-title"><span>6학년 (6th Grade)</span> 🎓</div>
            <div class="btn-group">
                <a href="grade6_1.html" class="btn btn-6">1학기 평가</a>
                <a href="grade6_2.html" class="btn btn-6">2학기 평가</a>
            </div>
        </div>

    </div>

    <div class="footer-note">
        © 2026 초등 영어 발달사항 매니저. 교육부 지침 기반 정밀 평가 시스템.
    </div>
</div>

</body>
</html>
