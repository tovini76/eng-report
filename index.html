<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 영어 생기부 통합 관리 시스템</title>
    <style>
        :root { 
            --primary: #1e293b; 
            --grade3: #10b981; 
            --grade4: #3b82f6; 
            --grade5: #f59e0b; 
            --grade6: #8b5cf6; 
            --bg: #f8fafc; 
        }
        * { box-sizing: border-box; text-decoration: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); margin: 0; padding: 20px 15px; color: #334155; }
        
        .container { max-width: 900px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 30px; padding-top: 10px; }
        .header h1 { color: var(--primary); font-size: 1.6rem; margin-bottom: 8px; letter-spacing: -0.5px; }
        .header p { color: #64748b; font-size: 1rem; margin: 0; word-break: keep-all; line-height: 1.4; }

        /* PC: 2단, 모바일: 1단 */
        .grade-grid { display: grid; gap: 15px; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .grade-grid { grid-template-columns: 1fr 1fr; gap: 20px; } }

        .grade-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: transform 0.2s; border: 1px solid #e2e8f0; }
        
        .grade-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        /* 학년별 테마 */
        .g3 { border-top: 6px solid var(--grade3); } .g3 .grade-title { color: var(--grade3); }
        .g4 { border-top: 6px solid var(--grade4); } .g4 .grade-title { color: var(--grade4); }
        .g5 { border-top: 6px solid var(--grade5); } .g5 .grade-title { color: var(--grade5); }
        .g6 { border-top: 6px solid var(--grade6); } .g6 .grade-title { color: var(--grade6); }

        /* 모바일 최적화의 핵심: 핸드폰에서는 세로(Column), PC에서는 가로(Row) */
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 400px) { .btn-group { flex-direction: row; } }

        .btn { flex: 1; text-align: center; padding: 16px 10px; border-radius: 12px; font-weight: 800; font-size: 1.05rem; color: white; display: block; }
        .btn:active { transform: scale(0.98); } /* 모바일 터치 피드백 */
        
        .btn-3 { background: #d1fae5; color: #047857; } 
        .btn-4 { background: #dbeafe; color: #1d4ed8; } 
        .btn-5 { background: #fef3c7; color: #b45309; } 
        .btn-6 { background: #ede9fe; color: #6d28d9; } 
        
        .footer-note { text-align: center; margin-top: 30px; font-size: 0.85rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏫 영어 생기부 관리 허브</h1>
        <p>2022 개정 기준 학년별 평가 시스템</p>
    </div>

    <div class="grade-grid">
        <div class="grade-card g3">
            <div class="grade-title"><span>3학년 (3rd Grade)</span> 🎒</div>
            <div class="btn-group">
                <a href="grade3_1.html" class="btn btn-3">1학기 평가하기</a>
                <a href="grade3_2.html" class="btn btn-3">2학기 평가하기</a>
            </div>
        </div>

        <div class="grade-card g4">
            <div class="grade-title"><span>4학년 (4th Grade)</span> 📘</div>
            <div class="btn-group">
                <a href="grade4_1.html" class="btn btn-4">1학기 평가하기</a>
                <a href="grade4_2.html" class="btn btn-4">2학기 평가하기</a>
            </div>
        </div>

        <div class="grade-card g5">
            <div class="grade-title"><span>5학년 (5th Grade)</span> 📙</div>
            <div class="btn-group">
                <a href="grade5_1.html" class="btn btn-5">1학기 평가하기</a>
                <a href="grade5_2.html" class="btn btn-5">2학기 평가하기</a>
            </div>
        </div>

        <div class="grade-card g6">
            <div class="grade-title"><span>6학년 (6th Grade)</span> 🎓</div>
            <div class="btn-group">
                <a href="grade6_1.html" class="btn btn-6">1학기 평가하기</a>
                <a href="grade6_2.html" class="btn btn-6">2학기 평가하기</a>
            </div>
        </div>
    </div>

    <div class="footer-note">
        © 2026 초등 영어 발달사항 매니저.
    </div>
</div>

</body>
</html>
