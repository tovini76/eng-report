<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에듀톡(EduTalk) - 영어 성적 자동 생성기</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 0.9em; }
        select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .level-btns { display: flex; gap: 10px; margin-top: 10px; }
        .level-btns button { flex: 1; padding: 10px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 8px; }
        .level-btns button.active { background: var(--primary); color: white; border-color: var(--primary); }
        #result-area { margin-top: 30px; padding: 20px; background: #f9f9f9; border-radius: 10px; border: 2px dashed var(--primary); }
        .byte-info { text-align: right; font-size: 0.8em; color: #666; margin-top: 5px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .main-btn { flex: 2; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .copy-btn { flex: 1; background: #34c759; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 초등 영어 발달사항 생성기</h1>
    
    <div class="grid">
        <div>
            <label>학년 선택</label>
            <select id="grade" onchange="updateStandards()">
                <option value="3">3학년</option>
                <option value="4">4학년</option>
                <option value="5">5학년</option>
                <option value="6">6학년</option>
            </select>
        </div>
        <div>
            <label>영역 선택</label>
            <select id="domain" onchange="updateStandards()">
                <option value="listening">듣기 (Listening)</option>
                <option value="speaking">말하기 (Speaking)</option>
                <option value="reading">읽기 (Reading)</option>
                <option value="writing">쓰기 (Writing)</option>
            </select>
        </div>
    </div>

    <label>성취 기준 선택</label>
    <select id="standard"></select>

    <label style="margin-top:20px;">성취 수준</label>
    <div class="level-btns" id="levelGroup">
        <button onclick="setLevel('high', this)" class="active">매우 잘함</button>
        <button onclick="setLevel('mid', this)">잘함/보통</button>
        <button onclick="setLevel('low', this)">노력요함</button>
    </div>

    <button class="main-btn" style="margin-top:30px;" onclick="generate()">문장 생성하기 ✨</button>

    <div id="result-area">
        <textarea id="output" rows="5" oninput="updateByteCount()"></textarea>
        <div class="byte-info">현재: <span id="byteCount">0</span> byte (나이스 기준 한글 약 500자 제한)</div>
        <div class="btn-group">
            <button class="copy-btn" onclick="copyText()">클립보드 복사 📋</button>
            <button onclick="location.reload()" style="padding:10px; border-radius:8px; border:1px solid #ddd; cursor:pointer;">초기화</button>
        </div>
    </div>
</div>

<script>
    // 30년 차 교사의 데이터셋 (샘플 데이터 - 실제 성취기준으로 확장 가능)
    const data = {
        "3": {
            "listening": [
                { std: "알파벳 대소문자를 식별하여 듣는다.", high: "알파벳 대소문자의 소리 차이를 정확히 식별하고 낱말의 첫소리를 아주 잘 파악함.", mid: "알파벳 대소문자를 듣고 대부분 식별하며 기초적인 낱말 소리에 익숙함.", low: "교사의 도움을 받아 알파벳 소리를 구별하려고 노력하며 집중하여 들음." }
            ],
            "speaking": [
                { std: "기초적인 인사말을 주고받는다.", high: "상황에 적절한 인사말을 유창하게 구사하며 자신감 있게 대화를 주도함.", mid: "기본적인 인사를 주고받을 수 있으며 적극적으로 의사소통에 참여함.", low: "짧은 인사말을 따라 하며 대화에 참여하려는 의지를 보임." }
            ]
        },
        "6": {
            "reading": [
                { std: "일상생활에 관한 짧고 쉬운 글을 읽고 이해한다.", high: "글의 중심 내용을 정확히 파악하며 세부 정보를 찾아내는 능력이 매우 탁월함.", mid: "글의 전체적인 흐름을 이해하고 주요 핵심 단어를 잘 찾아냄.", low: "그림의 도움을 받아 짧은 문장의 의미를 파악하려고 노력함." }
            ]
        }
    };

    let selectedLevel = 'high';

    function setLevel(lvl, btn) {
        selectedLevel = lvl;
        const btns = document.querySelectorAll('.level-btns button');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function updateStandards() {
        const grade = document.getElementById('grade').value;
        const domain = document.getElementById('domain').value;
        const stdSelect = document.getElementById('standard');
        stdSelect.innerHTML = "";

        if(data[grade] && data[grade][domain]) {
            data[grade][domain].forEach((item, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.text = item.std;
                stdSelect.add(opt);
            });
        } else {
            let opt = document.createElement('option');
            opt.text = "데이터 준비 중...";
            stdSelect.add(opt);
        }
    }

    function generate() {
        const grade = document.getElementById('grade').value;
        const domain = document.getElementById('domain').value;
        const stdIdx = document.getElementById('standard').value;

        if(!data[grade] || !data[grade][domain]) return;

        const baseText = data[grade][domain][stdIdx].std;
        const evalText = data[grade][domain][stdIdx][selectedLevel];
        
        document.getElementById('output').value = baseText + " " + evalText;
        updateByteCount();
    }

    function updateByteCount() {
        const text = document.getElementById('output').value;
        let bytes = 0;
        for (let i = 0; i < text.length; i++) {
            const code = text.charCodeAt(i);
            bytes += (code > 128) ? 3 : 1; // 나이스 기준 한글 3바이트 계산법 적용
        }
        document.getElementById('byteCount').innerText = bytes;
    }

    function copyText() {
        const textArea = document.getElementById('output');
        textArea.select();
        document.execCommand('copy');
        alert("복사되었습니다! 나이스(NEIS)에 붙여넣으세요.");
    }

    // 초기 로딩
    updateStandards();
</script>

</body>
</html>
