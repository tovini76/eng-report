<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 영어 생기부 평가 시스템 (교육부 지침 완벽 반영)</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #ea580c; --bg: #f1f5f9; --tab-bg: #e2e8f0; --tab-active: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; color: #334155; line-height: 1.6; }
        
        .container { max-width: 950px; margin: auto; background: #fff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* 학년 탭 UI */
        .grade-tabs { display: flex; background: var(--primary); color: #fff; }
        .g-tab { flex: 1; padding: 16px 0; text-align: center; font-weight: 800; cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 1.1rem; }
        .g-tab.active { opacity: 1; background: #fff; color: var(--primary); border-top: 4px solid var(--accent); }
        
        /* 학기 탭 UI */
        .term-tabs { display: flex; background: var(--tab-bg); border-bottom: 2px solid #cbd5e1; }
        .t-tab { flex: 1; padding: 12px 0; text-align: center; font-weight: 700; cursor: pointer; color: #64748b; transition: 0.2s; }
        .t-tab.active { background: var(--tab-active); color: var(--primary); border-bottom: 3px solid var(--primary); }

        .content { padding: 25px; }
        h2 { text-align: center; color: var(--primary); font-size: 1.3rem; margin-top: 0; margin-bottom: 20px; }
        
        .section { margin-bottom: 20px; padding: 18px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .section-title { font-weight: 800; color: var(--primary); margin-bottom: 12px; display: block; font-size: 1.05rem; border-left: 5px solid var(--accent); padding-left: 10px; }
        
        .input-grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
        @media (min-width: 600px) { .input-grid { grid-template-columns: 1fr 1.5fr 1fr; } }
        
        select, input, textarea { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 15px; outline: none; }
        select:focus, input:focus { border-color: var(--primary); }
        
        #detailList { font-weight: 700; color: #c2410c; border: 2px solid #fed7aa; background: #fff7ed; }
        
        .level-group { display: flex; gap: 8px; }
        .level-btn { flex: 1; padding: 14px; border: 2px solid #cbd5e1; background: #fff; border-radius: 10px; cursor: pointer; font-weight: 800; color: #64748b; }
        .level-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .btn-gen { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 1.2rem; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        #result-box { margin-top: 25px; background: #f0fdf4; padding: 20px; border-radius: 12px; border: 2px solid #bbf7d0; }
        textarea#output { background: transparent; border: none; height: 160px; font-size: 1.1rem; color: #166534; padding: 0; line-height: 1.8; font-weight: 500; }
        
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #bbf7d0; }
        .btn-copy { background: #059669; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="grade-tabs">
        <div class="g-tab active" onclick="setGrade(3)">3학년</div>
        <div class="g-tab" onclick="setGrade(4)">4학년</div>
        <div class="g-tab" onclick="setGrade(5)">5학년</div>
        <div class="g-tab" onclick="setGrade(6)">6학년</div>
    </div>
    
    <div class="term-tabs">
        <div class="t-tab active" id="term1" onclick="setTerm(1)">1학기</div>
        <div class="t-tab" id="term2" onclick="setTerm(2)">2학기</div>
    </div>

    <div class="content">
        <h2 id="pageTitle">📚 3학년 1학기 생기부 작성</h2>

        <div class="section">
            <span class="section-title">1. 학생 및 단원 설정</span>
            <div class="input-grid">
                <input type="text" id="name" placeholder="학생 성명">
                <select id="unit" onchange="updateDetails()"></select>
                <select id="domain" onchange="updateDetails()">
                    <option value="L">듣기</option>
                    <option value="S">말하기</option>
                    <option value="R">읽기</option>
                    <option value="W">쓰기</option>
                </select>
            </div>
        </div>

        <div class="section" style="background:#fff;">
            <span class="section-title" style="color:#ea580c; border-color:#ea580c;">2. 교육부 지침 세부 평가 (파닉스/낱말/대화)</span>
            <select id="detailList"></select>
        </div>

        <div class="section">
            <span class="section-title">3. [도입] 성취도 평가</span>
            <div class="level-group">
                <button class="level-btn active" id="btn-H" onclick="setLvl('H')">매우 잘함 (A)</button>
                <button class="level-btn" id="btn-M" onclick="setLvl('M')">보통 (B)</button>
                <button class="level-btn" id="btn-L" onclick="setLvl('L')">노력 요함 (C)</button>
            </div>
        </div>

        <div class="section">
            <span class="section-title">4. [전개] 구체적 관찰 활동</span>
            <select id="activity">
                <option value="특히, 짝과 함께하는 역할극(Role-play) 활동에서 배운 표현을 상황에 맞게 적절히 응용하는 능력을 보여줌.">역할극(Role-play) 응용력 우수</option>
                <option value="특히, 챈트와 노래 부르기 활동에 즐겁게 참여하며 영어 특유의 리듬과 억양을 자연스럽게 익힘.">챈트 및 노래 리듬감 우수</option>
                <option value="특히, 낱말 카드와 그림을 활용한 교실 놀이 활동에서 높은 집중력과 순발력을 발휘함.">교실 놀이/게임 집중력 우수</option>
                <option value="특히, 원어민 발음이나 시청각 자료를 듣고 의미를 파악하는 활동에서 높은 이해도를 보임.">시청각 매체 이해도 우수</option>
                <option value="특히, 파닉스 규칙을 찾고 알파벳을 쓰는 워크북 활동 시 꼼꼼하게 과제를 완수하는 성실함이 돋보임.">워크북 쓰기 성실성</option>
            </select>
        </div>

        <div class="section">
            <span class="section-title">5. [결론] 학습 태도 및 정의적 영역</span>
            <select id="att">
                <option value="또한, 수업에 늘 주도적으로 참여하며 자신감 있게 영어로 표현하려는 태도가 매우 훌륭함.">주도적 참여 및 자신감</option>
                <option value="또한, 모둠 활동 시 급우를 배려하고 협력적으로 과제를 수행하는 모습이 모범적임.">협력 및 배려심</option>
                <option value="또한, 영어 과목에 큰 흥미를 느끼며, 실수를 두려워하지 않고 발화하려는 도전 정신이 뛰어남.">영어에 대한 흥미와 도전</option>
                <option value="또한, 기초를 익히기 위해 스스로 반복해서 연습하며 꾸준히 실력을 향상시키는 모습이 대견함.">성실한 노력과 발전</option>
            </select>
        </div>

        <button class="btn-gen" onclick="make()">[도입+전개+결론] 완벽 문장 생성</button>

        <div id="result-box">
            <textarea id="output" readonly placeholder="학년/학기/단원별 세부 성취기준, 관찰 활동, 학습 태도가 결합된 완벽한 장문이 이곳에 생성됩니다."></textarea>
            <div class="footer">
                <span style="font-weight:bold; color:#166534;">나이스(NEIS) 글자 수: <span id="byteVal" style="color:#ea580c; font-size:1.2rem;">0</span> Byte</span>
                <button class="btn-copy" onclick="copy()">클립보드 복사</button>
            </div>
        </div>
    </div>
</div>

<script>

// UI 제어 함수들
function setGrade(g) {
    currentGrade = g;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    updateUI();
}

function setTerm(t) {
    currentTerm = t;
    document.querySelectorAll('.t-tab').forEach(tab => tab.classList.remove('active'));
    document.getElementById('term'+t).classList.add('active');
    updateUI();
}

function updateUI() {
    document.getElementById('pageTitle').innerText = `📚 ${currentGrade}학년 ${currentTerm}학기 생기부 작성`;
    const unitSelect = document.getElementById('unit');
    unitSelect.innerHTML = "";
    
    const units = UNIT_MAP[currentGrade][currentTerm];
    units.forEach(u => unitSelect.add(new Option(u.t, u.v)));
    
    updateDetails();
}

function updateDetails() {
    const u = document.getElementById('unit').value;
    const d = document.getElementById('domain').value;
    const s = document.getElementById('detailList');
    s.innerHTML = "";
    
    if(DB[currentGrade] && DB[currentGrade][u] && DB[currentGrade][u][d]) {
        DB[currentGrade][u][d].forEach((item, i) => s.add(new Option(item.s, i)));
    } else {
        s.add(new Option("해당 학년/단원 세부 지침 로드 준비 중...", ""));
    }
}

function setLvl(l) { 
    curLvl = l; 
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active')); 
    document.getElementById('btn-'+l).classList.add('active'); 
}

function make() {
    const n = document.getElementById('name').value || "이 학생";
    const u = document.getElementById('unit').value;
    const d = document.getElementById('domain').value;
    const i = document.getElementById('detailList').value;
    const act = document.getElementById('activity').value;
    const att = document.getElementById('att').value;
    
    if(!DB[currentGrade] || !DB[currentGrade][u] || !DB[currentGrade][u][d] || i === "") {
        return alert("선택된 영역의 세부 평가 항목 데이터가 없습니다. (4,5,6학년은 DB 구조만 세팅됨)");
    }
    
    // 3단 콤보 (성취도 + 전개활동 + 태도결론)
    const res = `${n} 학생은 ${DB[currentGrade][u][d][i][curLvl]} ${act} ${att}`;
    document.getElementById('output').value = res;
    
    // NEIS 3바이트 계산법 적용
    document.getElementById('byteVal').innerText = [...res].reduce((acc, c) => acc + (c.charCodeAt(0) > 128 ? 3 : 1), 0);
}

function copy() { 
    const o = document.getElementById('output'); 
    if(!o.value) return; 
    o.select(); o.setSelectionRange(0, 99999); 
    document.execCommand('copy'); 
    alert("3단 콤보 장문이 복사되었습니다!"); 
}

// 초기 실행
window.onload = updateUI;
</script>
