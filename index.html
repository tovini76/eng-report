<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 영어 생기부 관리 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { --primary: #1e293b; --bg-color: #f1f5f9; --card-bg: #ffffff; --border: #e2e8f0; --g3: #059669; --g4: #2563eb; --g5: #d97706; --g6: #7c3aed; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; text-decoration: none; }
        body { background: var(--bg-color); color: #0f172a; min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 900px; }
        .app-header { text-align: center; margin-bottom: 30px; }
        .app-header h1 { font-size: 1.8rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; margin-bottom: 10px; }
        .badge { display: inline-block; background: #e2e8f0; color: #475569; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; margin-bottom: 15px; }
        
        /* 출판사 선택 UI */
        .pub-selector { background: #fff; padding: 20px; border-radius: 12px; border: 2px solid var(--border); margin-bottom: 30px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .pub-selector label { font-weight: 800; font-size: 1.1rem; color: var(--primary); margin-right: 15px; }
        .pub-selector select { padding: 12px 20px; font-size: 1.05rem; font-weight: 700; border-radius: 8px; border: 2px solid var(--g3); outline: none; cursor: pointer; color: #0f172a; }
        
        .grade-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .grade-grid { grid-template-columns: 1fr 1fr; gap: 24px; } }
        .grade-card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; transition: transform 0.2s; }
        .card-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #f8fafc; }
        .card-title { font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .g3 .card-title { color: var(--g3); } .g3 { border-top: 4px solid var(--g3); }
        .g4 .card-title { color: var(--g4); } .g4 { border-top: 4px solid var(--g4); }
        .g5 .card-title { color: var(--g5); } .g5 { border-top: 4px solid var(--g5); }
        .g6 .card-title { color: var(--g6); } .g6 { border-top: 4px solid var(--g6); }
        
        .term-group { padding: 24px; display: flex; gap: 12px; }
        .btn { flex: 1; text-align: center; padding: 14px 0; border-radius: 10px; font-weight: 700; font-size: 1.05rem; color: #fff; cursor: pointer; transition: 0.2s; border: none; }
        .btn:active { transform: scale(0.97); }
        .g3 .btn { background: var(--g3); } .g3 .btn:hover { background: #047857; }
        .g4 .btn { background: var(--g4); } .g4 .btn:hover { background: #1d4ed8; }
        .g5 .btn { background: var(--g5); } .g5 .btn:hover { background: #b45309; }
        .g6 .btn { background: var(--g6); } .g6 .btn:hover { background: #6d28d9; }
        .btn.disabled { background: #f1f5f9; color: #94a3b8; pointer-events: none; border: 1px dashed #cbd5e1; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <span class="badge">2022 개정 교육과정 반영</span>
            <h1>교과학습발달상황 통합 평가 시스템</h1>
        </div>

        <div class="pub-selector">
            <label for="publisher">📚 출판사 선택:</label>
            <select id="publisher">
                <option value="chunjae">천재교육</option>
                <option value="ybm" selected>YBM (김혜리)</option>
            </select>
        </div>

        <div class="grade-grid">
            <div class="grade-card g3">
                <div class="card-header"><div class="card-title">🎒 3학년</div></div>
                <div class="term-group">
                    <button class="btn" onclick="goToPage(3, 1)">1학기 평가</button>
                    <button class="btn" onclick="goToPage(3, 2)">2학기 평가</button>
                </div>
            </div>
            <div class="grade-card g4">
                <div class="card-header"><div class="card-title">📘 4학년</div></div>
                <div class="term-group">
                    <button class="btn disabled">1학기 준비중</button><button class="btn disabled">2학기</button>
                </div>
            </div>
            <div class="grade-card g5">
                <div class="card-header"><div class="card-title">📙 5학년</div></div>
                <div class="term-group">
                    <button class="btn disabled">1학기 준비중</button><button class="btn disabled">2학기</button>
                </div>
            </div>
            <div class="grade-card g6">
                <div class="card-header"><div class="card-title">🎓 6학년</div></div>
                <div class="term-group">
                    <button class="btn disabled">1학기 준비중</button><button class="btn disabled">2학기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 출판사와 학년을 조합하여 자동으로 파일 주소 연결
        function goToPage(grade, term) {
            const pub = document.getElementById('publisher').value;
            window.location.href = `grade${grade}_${term}_${pub}.html`;
        }
    </script>
</body>
</html>
