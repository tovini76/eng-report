<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 영어 학습발달상황 생성기</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); padding: 40px; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); border-bottom: 3px solid var(--accent); padding-bottom: 15px; margin-bottom: 30px; }
        
        .section { margin-bottom: 25px; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .section-title { font-weight: bold; color: var(--accent); margin-bottom: 15px; display: block; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        .input-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .level-selector { display: flex; gap: 10px; margin-top: 10px; }
        .level-selector button { flex: 1; padding: 12px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .level-selector button.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: bold; }
        
        #result-box { background: #fff8e1; border: 2px solid #ffe082; padding: 20px; border-radius: 8px; margin-top: 30px; position: relative; }
        textarea { resize: none; border: none; background: transparent; width: 100%; font-size: 15px; font-weight: 500; color: #444; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-copy { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: right; margin-top: 10px; }
        .byte-check { font-size: 12px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 초등 영어 학습발달상황 전문가용</h1>

    <div class="section">
        <span class="section-title">1. 학생 기본 정보 및 영역 설정</span>
        <div class="input-group">
            <input type="text" id="studentName" placeholder="학생 이름 입력 (예: 홍길동)">
            <select id="grade" onchange="loadStandards()">
                <option value="3">3학년</option>
                <option value="4">4학년</option>
            </select>
            <select id="domain" onchange="loadStandards()">
                <option value="listening">듣기</option>
                <option value="speaking">말하기</option>
                <option value="reading">읽기</option>
                <option value="writing">쓰기</option>
            </select>
        </div>
    </div>

    <div class="section">
        <span class="section-title">2. 성취 기준 선택</span>
        <select id="standardList"></select>
    </div>

    <div class="section">
        <span class="section-title">3. 수행 수준 및 태도</span>
        <div class="level-selector" id="levelGroup">
            <button onclick="changeLevel('high', this)" class="active">우수 (상)</button>
            <button onclick="changeLevel('mid', this)">보통 (중)</button>
            <button onclick="changeLevel('low', this)">노력요함 (하)</button>
        </div>
        <select id="attitude" style="margin-top:15px;">
            <option value="학습 활동에 적극적으로 참여하며 급우들과 협력하는 태도가 훌륭함.">적극적 참여 및 협력</option>
            <option value="자신의 생각을 표현하는 데 자신감이 있으며 꾸준히 노력하는 모습이 돋보임.">자신감 및 성실함</option>
            <option value="수업 집중도가 높고 과제 수행 능력이 뛰어나 타의 모범이 됨.">높은 집중도 및 모범</option>
            <option value="기초를 익히기 위해 성실하게 노력하며 꾸준히 실력이 향상되고 있음.">기초 학습 노력</option>
        </select>
    </div>

    <button class="btn-main" onclick="generateReport()">최종 문장 생성하기 🚀</button>

    <div id="result-box">
        <textarea id="finalOutput" rows="4" readonly></textarea>
        <div class="byte-check">입력된 글자 수: <span id="byteVal">0</span> Byte (나이스 기준)</div>
        <button class="btn-copy" onclick="copyToClipboard()">나이스로 복사하기 📋</button>
        <div style="clear:both;"></div>
    </div>
</div>

<script>
    // 베테랑 교사가 감수하는 정석 성취 데이터
const reportData = {
        "3": {
            "listening": [
                { 
                    std: "[듣기] 알파벳 대소문자와 낱말의 소리를 식별한다.", 
                    high: "알파벳 대소문자의 음가 차이를 명확히 인지하고 있으며, 낱말의 첫소리를 듣고 해당 철자를 정확하게 찾아내는 청각적 식별력이 매우 뛰어남.", 
                    mid: "알파벳 대소문자의 소리를 대부분 구별하여 들으며, 익숙한 낱말의 소리를 듣고 그림과 연결하여 의미를 파악하는 능력이 안정적임.", 
                    low: "교사의 시범과 반복 청취를 통해 알파벳의 기초 음가를 익히는 과정에 있으며, 소리에 집중하여 들으려는 자세가 성실함." 
                },
                { 
                    std: "[듣기] 기초적인 낱말, 어구, 문장의 의미를 파악한다.", 
                    high: "일상생활 속의 기초적인 낱말과 짧은 문장을 듣고 그 의미를 즉각적으로 파악하며, 상황에 맞는 언어적/비언어적 반응이 매우 빠르고 정확함.", 
                    mid: "그림이나 실물 등 시각적 도움을 받아 기초적인 문장의 의미를 대체로 잘 이해하며 학습 활동에 적극 참여함.", 
                    low: "반복되는 핵심 단어를 중심으로 문장의 의미를 파악하려고 노력하며, 기초 어휘력을 쌓기 위해 꾸준히 집중함." 
                }
            ],
            "speaking": [
                { 
                    std: "[말하기] 기초적인 인사말을 주고받으며 자기소개를 한다.", 
                    high: "상황에 적절한 인사말을 자연스러운 발음과 억양으로 구사하며, 이름과 신분 등 자기소개를 자신감 있는 태도로 유창하게 표현함.", 
                    mid: "기본적인 인사를 주고받을 수 있으며, 학습한 문형을 활용하여 자신의 정보를 상대방에게 무난하게 전달함.", 
                    low: "교사의 도움을 받아 짧은 인사말을 따라 말하며, 영어로 대화하려는 시도 자체에 긍정적인 변화를 보임." 
                }
            ],
            "reading": [
                { 
                    std: "[읽기] 알파벳 대소문자를 구별하여 읽는다.", 
                    high: "알파벳 대소문자를 명확히 식별하고 각 철자가 내는 소리와의 관계를 이해하여 처음 보는 단어도 소리 내어 읽으려는 도전적인 태도가 돋보임.", 
                    mid: "대부분의 알파벳 대소문자를 정확히 읽을 수 있으며, 시각 자료와 연계하여 낱말의 의미를 파악하는 능력이 양호함.", 
                    low: "철자의 모양을 구별하며 소리 내어 읽으려고 노력 중이며, 알파벳 대소문자 매칭 활동에 성실히 참여함." 
                }
            ],
            "writing": [
                { 
                    std: "[쓰기] 알파벳 대소문자를 순서에 맞게 쓴다.", 
                    high: "알파벳 대소문자의 모양과 쓰는 순서를 완벽히 숙지하고 있으며, 네 줄 선의 위치에 맞춰 규격대로 바르고 정교하게 쓰는 능력이 탁월함.", 
                    mid: "대부분의 알파벳을 순서에 맞게 쓸 수 있으며, 대문자와 소문자의 높낮이 차이를 인지하며 성실하게 쓰기 과제를 수행함.", 
                    low: "알파벳의 모양을 보고 베껴 쓰며 쓰는 순서와 방향을 익히기 위해 반복적으로 연습하는 태도가 진지함." 
                }
            ]
        },
        "4": {
            "listening": [
                { 
                    std: "[듣기] 일상생활에 관한 쉽고 간단한 대화를 듣고 이해한다.", 
                    high: "일상적인 상황에서 오가는 대화의 핵심 내용을 명확히 파악함은 물론, 세부 정보와 화자의 의도까지 정확하게 이해하는 청취 역량을 갖춤.", 
                    mid: "상황 설명이나 시각적 힌트를 바탕으로 대화의 주요 내용을 대체로 바르게 파악하며 흐름을 잘 따라감.", 
                    low: "반복되는 핵심 표현을 중심으로 대화의 전체적인 상황을 이해하려고 노력하며 경청하는 태도가 형성되어 있음." 
                }
            ],
            "speaking": [
                { 
                    std: "[말하기] 쉽고 간단한 질문에 답하며 정보를 전달한다.", 
                    high: "시간, 장소, 소유 등 일상적인 질문에 대해 적절한 문법과 어휘를 선택하여 즉각적이고 유창하게 대답하는 의사소통 능력이 뛰어남.", 
                    mid: "기초적인 질문의 의도를 파악하여 학습한 표현을 바탕으로 문장을 구성하여 대답할 수 있으며 발표 의욕이 높음.", 
                    low: "핵심 낱말 위주로 질문에 응답하며, 상대방과 소통하려는 의지를 가지고 짧은 대답을 이어가려 노력함." 
                }
            ],
            "reading": [
                { 
                    std: "[읽기] 짧고 쉬운 문장을 읽고 의미를 파악한다.", 
                    high: "문장 내 어휘의 의미와 구조를 이해하며 자연스러운 리듬과 억양으로 유창하게 읽고, 전체적인 맥락을 정확히 해석함.", 
                    mid: "그림의 도움을 받아 짧은 문장의 의미를 파악하며 소리 내어 읽을 수 있고 읽기 연습에 성실함.", 
                    low: "이미 배운 낱말을 중심으로 문장을 한 단어씩 읽어보려 시도하며 독해의 기초를 다지기 위해 노력함." 
                }
            ],
            "writing": [
                { 
                    std: "[쓰기] 구두로 익힌 낱말이나 어구를 보고 쓴다.", 
                    high: "소리와 철자의 관계(Phonics)를 잘 이해하여 익힌 낱말을 철자 오류 없이 정확하게 쓰며, 문장 부호 사용도 바름.", 
                    mid: "익숙한 낱말이나 어구를 보고 쓰거나 기억하여 쓸 수 있으며, 쓰기 활동을 통해 학습 내용을 체계적으로 정리함.", 
                    low: "낱말의 모양을 확인하며 천천히 옮겨 적는 과정에 집중하고 있으며, 기초 철자를 익히기 위해 꾸준히 연습함." 
                }
            ]
        }
    };
        "4": {
            "listening": [
                { std: "일상생활에 관한 쉽고 간단한 대화를 듣고 이해한다.", high: "일상생활의 다양한 상황에서 오가는 대화의 핵심 내용을 명확히 파악하고 세부 정보까지 정확하게 이해함.", mid: "시각 자료의 도움을 받아 일상적인 대화의 주요 내용을 대체로 바르게 파악함.", low: "반복되는 핵심 단어를 중심으로 대화의 상황을 파악하려고 노력하며 주의 깊게 경청함." }
            ]
        }
    };

    let selectedLevel = 'high';

    function changeLevel(lvl, btn) {
        selectedLevel = lvl;
        const btns = document.querySelectorAll('.level-selector button');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function loadStandards() {
        const grade = document.getElementById('grade').value;
        const domain = document.getElementById('domain').value;
        const stdList = document.getElementById('standardList');
        stdList.innerHTML = "";

        if(reportData[grade] && reportData[grade][domain]) {
            reportData[grade][domain].forEach((item, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.text = item.std;
                stdList.add(opt);
            });
        } else {
            stdList.add(new Option("해당 영역 데이터 준비 중", ""));
        }
    }

    function generateReport() {
        const name = document.getElementById('studentName').value || "이 학생";
        const grade = document.getElementById('grade').value;
        const domain = document.getElementById('domain').value;
        const stdIdx = document.getElementById('standardList').value;
        const att = document.getElementById('attitude').value;

        if(stdIdx === "") return alert("성취 기준을 선택해 주세요.");

        const content = reportData[grade][domain][stdIdx][selectedLevel];
        
        // 문장 조합: [이름] + [학습 내용] + [태도]
        const finalSentence = `${name} 학생은 ${content} 또한 ${att}`;
        
        document.getElementById('finalOutput').value = finalSentence;
        updateBytes(finalSentence);
    }

    function updateBytes(text) {
        let bytes = 0;
        for (let i = 0; i < text.length; i++) {
            const code = text.charCodeAt(i);
            bytes += (code > 128) ? 3 : 1; // 나이스 한글 3바이트 기준
        }
        document.getElementById('byteVal').innerText = bytes;
    }

    function copyToClipboard() {
        const target = document.getElementById('finalOutput');
        target.select();
        document.execCommand('copy');
        alert("클립보드에 복사되었습니다. 나이스에 붙여넣으세요!");
    }

    window.onload = loadStandards;
</script>

</body>
</html>
