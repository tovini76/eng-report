<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 영어 생기부 시스템 - 메인</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; }
        * { box-sizing: border-box; text-decoration: none; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--primary); font-size: 2rem; margin-bottom: 10px; letter-spacing: -1px; }
        .header p { color: #64748b; font-size: 1.1rem; }

        .grade-card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 6px solid var(--accent); }
        .grade-title { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        .btn-group { display: flex; gap: 15px; }
        .btn { flex: 1; text-align: center; padding: 15px; background: #eff6ff; color: var(--accent); border-radius: 10px; font-weight: 700; transition: 0.3s; border: 1px solid #bfdbfe; }
        .btn:hover { background: var(--accent); color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        
        .disabled { background: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏫 영어 생기부 관리 시스템</h1>
        <p>평가할 학년과 학기를 선택해 주세요.</p>
    </div>

    <div class="grade-card">
        <div class="grade-title"><span>3학년 (3rd Grade)</span> 🎒</div>
        <div class="btn-group">
            <a href="grade3_1.html" class="btn">1학기 평가하기</a>
            <a href="#" class="btn disabled">2학기 (준비중)</a>
        </div>
    </div>

    <div class="grade-card">
        <div class="grade-title"><span>4학년 (4th Grade)</span> 📘</div>
        <div class="btn-group">
            <a href="#" class="btn disabled">1학기 (준비중)</a>
            <a href="#" class="btn disabled">2학기 (준비중)</a>
        </div>
    </div>

</body>
</html>
