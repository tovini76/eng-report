<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>평가 관리 메인 홈</title>
    <style>
        /* 기본 리셋 및 모바일 터치 최적화 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f1f5f9; color: #334155; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        a { text-decoration: none; }

        /* 모바일 앱 스타일의 중앙 컨테이너 */
        .app-container { width: 100%; max-width: 500px; }

        /* 상단 헤더 */
        .app-header { text-align: center; margin-bottom: 25px; padding: 25px 20px; background: #fff; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .app-header h1 { font-size: 1.5rem; color: #0f172a; margin-bottom: 5px; letter-spacing: -0.5px; }
        .app-header p { font-size: 0.95rem; color: #64748b; }

        /* 학년 리스트 (세로 배열) */
        .grade-list { display: flex; flex-direction: column; gap: 16px; }

        /* 학년별 카드 껍데기 */
        .grade-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        
        /* 카드 상단 띠 (학년 표시) */
        .card-header { padding: 16px 20px; color: #fff; font-weight: 800; font-size: 1.15rem; display: flex; justify-content: space-between; align-items: center; letter-spacing: -0.5px; }

        /* 학년별 메인 컬러 */
        .grade-3 .card-header { background: #10b981; } /* 3학년: 초록 */
        .grade-4 .card-header { background: #3b82f6; } /* 4학년: 파랑 */
        .grade-5 .card-header { background: #f59e0b; } /* 5학년: 주황 */
        .grade-6 .card-header { background: #8b5cf6; } /* 6학년: 보라 */

        /* 학기 선택 버튼 영역 */
        .term-buttons { display: flex; padding: 15px; gap: 12px; background: #fff; }
        .term-btn { flex: 1; padding: 14px 0; text-align: center; border-radius: 12px; font-weight: 800; font-size: 1.05rem; border: 2px solid #e2e8f0; color: #64748b; background: #f8fafc; transition: 0.2s; }
        .term-btn:active { transform: scale(0.96); } /* 터치 시 눌리는 효과 */

        /* 활성화된 버튼 색상 (링크가 걸려있는 버튼) */
        .grade-3 .term-btn.active { background: #d1fae5; color: #047857; border-color: #10b981; }
        .grade-4 .term-btn.active { background: #dbeafe; color: #1d4ed8; border-color: #3b82f6; }
        .grade-5 .term-btn.active { background: #fef3c7; color: #b45309; border-color: #f59e0b; }
        .grade-6 .term-btn.active { background: #ede9fe; color: #6d28d9; border-color: #8b5cf6; }

        /* 비활성화 버튼 (아직 안 만든 페이지) */
        .disabled { opacity: 0.4; pointer-events: none; background: #f1f5f9; border-color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="app-container">
        
        <div class="app-header">
            <h1>🏆 영어교과 나이스 작성 By vini</h1>
            <p>작업할 학년과 학기를 선택하세요.</p>
        </div>

        <div class="grade-list">
            
            <div class="grade-card grade-3">
                <div class="card-header"><span>3학년</span> 🎒</div>
                <div class="term-buttons">
                    <a href="grade3_1.html" class="term-btn active">1학기</a>
                    <a href="#" class="term-btn disabled">2학기</a>
                </div>
            </div>

            <div class="grade-card grade-4">
                <div class="card-header"><span>4학년</span> 📘</div>
                <div class="term-buttons">
                    <a href="#" class="term-btn disabled">1학기</a>
                    <a href="#" class="term-btn disabled">2학기</a>
                </div>
            </div>

            <div class="grade-card grade-5">
                <div class="card-header"><span>5학년</span> 📙</div>
                <div class="term-buttons">
                    <a href="#" class="term-btn disabled">1학기</a>
                    <a href="#" class="term-btn disabled">2학기</a>
                </div>
            </div>

            <div class="grade-card grade-6">
                <div class="card-header"><span>6학년</span> 🎓</div>
                <div class="term-buttons">
                    <a href="#" class="term-btn disabled">1학기</a>
                    <a href="#" class="term-btn disabled">2학기</a>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
