<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3학년 영어 세부 성취도 평가 시스템</title>
    <style>
        :root { --primary: #0f172a; --accent: #059669; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; line-height: 1.6; }
        
        .container { max-width: 900px; margin: auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border-top: 8px solid var(--primary); }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        
        .section { margin-bottom: 25px; padding: 20px; background: #f1f5f9; border-radius: 12px; }
        .section-title { font-weight: 800; color: var(--primary); margin-bottom: 15px; display: block; font-size: 1rem; border-left: 5px solid var(--accent); padding-left: 10px; }
        
        .input-grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
        @media (min-width: 600px) { .input-grid { grid-template-columns: 1fr 1.5fr 1fr; } }
        
        select, input, textarea { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 15px; background: #fff; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: var(--accent); }
        
        /* 세부 항목 선택 박스 강조 */
        #detailList { border: 2px solid var(--primary); font-weight: 600; color: var(--primary); }
        
        .level-group { display: flex; gap: 8px; }
        .level-btn { flex: 1; padding: 15px; border: 2px solid #cbd5e1; background: #fff; border-radius: 10px; cursor: pointer; font-weight: 800; color: #64748b; }
        .level-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        
        .btn-gen { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        #result-box { margin-top: 20px; background: #ecfdf5; padding: 20px; border-radius: 12px; border: 2px solid #a7f3d0; }
        textarea#output { background: transparent; border: none; height: 160px; font-size: 1.05rem; color: #064e3b; padding: 0; }
        
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid #a7f3d0; padding-top: 15px; }
        .byte { font-weight: 700; color: #b45309; }
        .btn-copy { background: #059669; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 3학년 단원별 세부 성취도 평가표</h1>

    <div class="section">
        <span class="section-title">1. 단원 및 영역 선택</span>
        <div class="input-grid">
            <input type="text" id="name" placeholder="학생 성명">
            <select id="unit" onchange="loadDetails()">
                <option value="U1">1단원. Hello (인사/소개)</option>
                <option value="U2">2단원. What's This? (사물/음소)</option>
                <option value="U3">3단원. Stand Up (지시/명령)</option>
            </select>
            <select id="domain" onchange="loadDetails()">
                <option value="L">듣기 (청해)</option>
                <option value="S">말하기 (발화)</option>
                <option value="R">읽기 (독해)</option>
                <option value="W">쓰기 (영작)</option>
            </select>
        </div>
    </div>

    <div class="section" style="background:#fff;">
        <span class="section-title" style="color:#b45309; border-color:#b45309;">2. 세부 심화 평가 항목 (성취기준 세분화)</span>
        <select id="detailList"></select>
    </div>

    <div class="section">
        <span class="section-title">3. 수행 수준 판정</span>
        <div class="level-group">
            <button class="level-btn active" id="btn-H" onclick="setLvl('H')">매우 우수 (A)</button>
            <button class="level-btn" id="btn-M" onclick="setLvl('M')">보통/양호 (B)</button>
            <button class="level-btn" id="btn-L" onclick="setLvl('L')">기초 노력 (C)</button>
        </div>
    </div>

    <div class="section">
        <span class="section-title">4. 관찰된 학습 태도</span>
        <select id="att">
            <option value="외국어 학습에 대한 흥미가 매우 높으며, 과제 수행 시 자기주도적인 학습 태도가 돋보임.">자기주도적 학습 태도</option>
            <option value="짝 활동이나 모둠 활동 시 급우를 배려하며 적극적으로 의사소통에 참여함.">배려 및 협력적 소통</option>
            <option value="발음이나 문법의 오류를 두려워하지 않고 끊임없이 발화하려는 도전 정신이 우수함.">도전적 발화 시도</option>
        </select>
    </div>

    <button class="btn-gen" onclick="make()">세부 평가 결과 생성 🚀</button>

    <div id="result-box">
        <textarea id="output" readonly placeholder="선택한 세부 항목에 대한 평가 결과가 나옵니다."></textarea>
        <div class="footer">
            <div class="byte">NEIS 입력 바이트: <span id="byteVal">0</span> Byte</div>
            <button class="btn-copy" onclick="copy()">복사</button>
        </div>
    </div>
</div>

<script>
// 🔥 극심화 데이터: 단원별 > 영역별 > [세부 평가요소 1, 2, 3...]
const DB = {
    "U1": { 
        "L": [
            { s: "[세부1] 아침, 점심, 저녁에 맞는 인사말 구별하여 듣기", H: "시간대별(아침, 점심, 저녁) 인사말의 음운적 차이를 명확히 식별하며, 상황에 맞는 인사말을 듣고 즉각적으로 이해함.", M: "그림 힌트나 교사의 제스처를 참고하여 시간대별 인사말을 듣고 그 의미를 대체로 바르게 구별함.", L: "반복되는 인사말 소리에 주의를 기울이며, 시간대에 따른 인사말의 차이를 구별하려고 노력함." },
            { s: "[세부2] 처음 만나는 상황의 안부 묻고 답하기 듣기", H: "처음 만나는 사람과 안부를 묻는 대화(How are you? 등)를 듣고 화자의 의도와 담화의 맥락을 완벽히 파악함.", M: "안부를 묻고 답하는 기본적인 대화를 듣고 주요 표현의 의미를 무난하게 이해함.", L: "안부를 묻는 대화의 핵심 단어에 집중하여 담화의 전반적인 분위기를 이해하려 시도함." }
        ],
        "S": [
            { s: "[세부1] 시간과 상황에 알맞은 억양으로 인사하기", H: "시간대와 상황에 부합하는 적절한 억양과 리듬을 사용하여 원어민에 가까운 자연스러운 발화로 인사함.", M: "학습한 문형을 바탕으로 상황에 맞는 인사말을 큰 목소리로 자신감 있게 표현함.", L: "교사의 발음을 듣고 따라 하며, 억양과 강세를 모방하여 인사말을 말해보려 노력함." },
            { s: "[세부2] 자신을 소개하고 헤어지는 인사하기", H: "I'm ~ 구문을 활용하여 자신을 정확히 소개하고, 대화를 마칠 때 알맞은 작별 인사를 유창하게 구사함.", M: "자신의 이름을 넣어 자기소개를 할 수 있으며, 헤어질 때의 기본 인사말을 적절히 표현함.", L: "단어 수준에서 자신의 이름을 말하고, 짝과 함께 헤어지는 인사를 주고받는 활동에 성실히 참여함." }
        ],
        "R": [
            { s: "[세부1] 알파벳 A~M 대소문자 짝지어 읽기", H: "알파벳 A부터 M까지 대소문자의 형태를 완벽히 매칭하고, 각 철자의 명칭을 정확한 발음으로 지체 없이 읽음.", M: "대부분의 알파벳 A~M 대소문자를 짝지어 식별할 수 있으며 소리 내어 읽기 활동에 흥미를 보임.", L: "대문자와 소문자의 모양을 대조하며 천천히 식별하고, 교사와 함께 알파벳을 읽는 과정에 집중함." }
        ],
        "W": [
            { s: "[세부1] 알파벳 A~M 대소문자 획순에 맞게 쓰기", H: "알파벳 A~M의 획순과 방향을 완벽히 숙지하고 네 줄 선의 알맞은 위치에 정교하고 반듯하게 쓰는 능력이 탁월함.", M: "주어진 기준선을 참고하여 알파벳 대소문자(A~M)를 순서에 맞게 쓰며 과제를 깔끔하게 완수함.", L: "알파벳 쓰기표를 보고 모양을 관찰하며 베껴 쓰기를 통해 바른 획순을 익히려 꾸준히 연습함." }
        ]
    },
    "U2": { 
        "L": [
            { s: "[세부1] 학용품을 나타내는 낱말 듣고 식별하기", H: "다양한 학용품의 명칭을 듣고 즉각적으로 해당 사물을 가리키거나 찾아내는 음운 식별 및 정보 처리 능력이 우수함.", M: "친숙한 학용품 명칭을 듣고 그림 카드와 바르게 연결하며 의미를 대체로 잘 파악함.", L: "학용품 이름의 첫소리에 단서를 두고 듣기 활동에 집중하며 사물과 낱말을 매칭하려 시도함." },
            { s: "[세부2] 사물이 무엇인지 묻는 질문 듣고 이해하기", H: "What's this/that? 구문을 듣고 거리에 따른 사물 지칭의 차이를 명확히 인지하여 화자의 질문 의도를 정확히 파악함.", M: "사물을 가리키며 무엇인지 묻는 질문을 듣고 상황적 맥락을 통해 그 의미를 무난히 이해함.", L: "What's 라는 핵심 의문사에 귀 기울이며 사물을 묻는 상황임을 눈치채고 대화에 참여하려 함." }
        ],
        "S": [
            { s: "[세부1] 사물의 이름을 묻고 답하는 대화하기", H: "사물을 가리키며 묻고 답하는 롤플레이(Role-play) 상황에서 적절한 어휘와 문장 구조를 활용하여 주도적으로 상호작용함.", M: "짝과 함께 사물의 이름을 묻고 답하는 기본 구문을 주고받으며 말하기 활동에 적극적으로 임함.", L: "제시된 사물 카드를 보고 이름을 말하며, 의문문 구조를 천천히 따라 말해보려 노력함." }
        ],
        "R": [
            { s: "[세부1] 알파벳 N~Z 대소문자 짝지어 읽기", H: "알파벳 N~Z 대소문자의 형태적 특징을 완벽히 인지하여 혼동하기 쉬운 철자(p/q 등)도 명확하게 구별하여 읽음.", M: "대부분의 알파벳 N~Z 대소문자를 정확히 식별하여 읽을 수 있으며 챈트나 노래를 통한 읽기 활동을 즐김.", L: "유사한 모양의 알파벳 철자를 구별하려 노력하며 한 글자씩 소리 내어 읽는 연습에 성실함." }
        ],
        "W": [
            { s: "[세부1] 알파벳 N~Z 대소문자 획순에 맞게 쓰기", H: "알파벳 N~Z의 획순을 정확히 지키며 문자의 크기와 비율을 고려하여 매우 정돈된 글씨체로 씀.", M: "대문자와 소문자의 높낮이를 인지하여 선에 맞게 알파벳(N~Z)을 순서대로 쓰며 집중력을 보임.", L: "알파벳의 둥근 부분과 직선 부분을 관찰하며 천천히 옮겨 적고 쓰기 기초를 다지기 위해 성실히 연습함." }
        ]
    },
    "U3": { 
        "L": [
            { s: "[세부1] 일상적인 동작과 관련된 지시 듣고 이해하기", H: "Stand up, Sit down, Open/Close 등 상반되는 동작을 나타내는 동사를 명확히 구별하여 듣고 즉각 이해함.", M: "동작을 나타내는 핵심 동사를 듣고 교사의 제스처 없이도 그 의미를 대체로 바르게 파악함.", L: "반복되는 동사의 소리에 익숙해지려 노력하며, 동작과 관련된 듣기 활동에 주의를 기울임." },
            { s: "[세부2] 긍정/부정의 지시문 듣고 구별하기", H: "Do와 Don't로 시작하는 지시문의 억양 차이를 예민하게 포착하여 긍정과 부정의 지시를 완벽히 구별하여 행동함.", M: "하지 말라는 부정의 지시(Don't~)를 듣고 문장의 의도를 파악하여 적절히 멈추거나 반응함.", L: "부정어 Don't의 소리에 집중하며 교실 내 규칙이나 지시사항을 이해하려고 꾸준히 시도함." }
        ],
        "S": [
            { s: "[세부1] 동작을 지시하는 말에 알맞게 반응하며 말하기", H: "상대방에게 명확한 강세와 억양으로 지시하거나 명령하는 말을 유창하게 구사하며 교실 놀이를 주도함.", M: "학습한 동작 동사를 활용하여 짝에게 간단한 지시를 내리고 이에 알맞게 반응하는 활동에 능숙함.", L: "동작을 나타내는 낱말을 말하며 짝과 함께 지시하고 반응하는 신체 활동(TPR)에 즐겁게 참여함." }
        ],
        "R": [
            { s: "[세부1] 시각 자료와 낱말 연결하여 읽기", H: "동작을 나타내는 그림을 보고 해당 낱말의 철자를 소리와 완벽하게 대응시켜 자연스럽게 읽어냄.", M: "학습한 동사 낱말을 소리 내어 읽고 그에 알맞은 행동 그림을 바르게 찾아 연결함.", L: "낱말의 첫 알파벳 소리를 단서로 동작을 나타내는 낱말을 더듬더듬 읽어보려 시도함." }
        ],
        "W": [
            { s: "[세부1] 동작을 나타내는 기초 낱말 쓰기", H: "동작을 나타내는 낱말의 철자 체계를 정확히 이해하여 시각 자료 없이도 철자 오류 없이 완벽하게 씀.", M: "학습한 동작 낱말을 보고 네 줄 선에 맞추어 바른 획순과 간격으로 깔끔하게 베껴 씀.", L: "낱말 카드를 확인하며 한 글자씩 천천히 옮겨 적고 단어 쓰기 과제에 성실하게 임함." }
        ]
    }
};

let curLvl = 'H';
function setLvl(l) { 
    curLvl = l; 
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active')); 
    document.getElementById('btn-'+l).classList.add('active'); 
}

function loadDetails() {
    const u = document.getElementById('unit').value;
    const d = document.getElementById('domain').value;
    const s = document.getElementById('detailList');
    s.innerHTML = "";
    
    if(DB[u] && DB[u][d]) {
        DB[u][d].forEach((item, i) => s.add(new Option(item.s, i)));
    } else {
        s.add(new Option("해당 영역의 세부 항목이 없습니다.", ""));
    }
}

function make() {
    const n = document.getElementById('name').value || "이 학생";
    const u = document.getElementById('unit').value;
    const d = document.getElementById('domain').value;
    const i = document.getElementById('detailList').value;
    const a = document.getElementById('att').value;
    
    if(!DB[u] || !DB[u][d] || i === "") return alert("세부 항목을 선택해주세요.");
    
    // 심화 평가 문장 조합
    const res = `${n} 학생은 ${DB[u][d][i][curLvl]} 또한 ${a}`;
    document.getElementById('output').value = res;
    
    // 바이트 계산
    document.getElementById('byteVal').innerText = [...res].reduce((acc, c) => acc + (c.charCodeAt(0) > 128 ? 3 : 1), 0);
}

function copy() { 
    const o = document.getElementById('output'); 
    if(!o.value) return; 
    o.select(); o.setSelectionRange(0, 99999); 
    document.execCommand('copy'); 
    alert("극심화 평가 문장이 복사되었습니다."); 
}

window.onload = loadDetails;
</script>
</body>
</html>
