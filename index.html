<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3학년 실무형 영어 발달사항 평가</title>
    <style>
        :root { --primary: #0f766e; --accent: #b45309; --bg: #f0fdf4; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #334155; line-height: 1.6; }
        
        .container { max-width: 900px; margin: auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 8px solid var(--primary); }
        h1 { text-align: center; color: var(--primary); font-size: 1.4rem; margin-bottom: 20px; }
        
        .section { margin-bottom: 20px; padding: 15px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .section-title { font-weight: 700; color: var(--primary); margin-bottom: 12px; display: block; font-size: 1rem; border-left: 4px solid var(--accent); padding-left: 8px; }
        
        .input-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
        @media (min-width: 600px) { .input-grid { grid-template-columns: 1fr 1.2fr 1fr; } }
        
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; }
        select:focus, input:focus { border-color: var(--primary); }
        
        /* 세분류 박스 강조 */
        #detailList { font-weight: 600; color: #0f766e; border: 2px solid #0f766e; }
        
        .level-group { display: flex; gap: 6px; }
        .level-btn { flex: 1; padding: 12px; border: 1px solid #cbd5e1; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 700; color: #64748b; }
        .level-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .btn-gen { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        #result-box { margin-top: 20px; background: #fffbeb; padding: 15px; border-radius: 8px; border: 1px solid #fde68a; }
        textarea#output { background: transparent; border: none; height: 120px; font-size: 1rem; color: #1e293b; padding: 0; }
        
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #fde68a; }
        .btn-copy { background: #b45309; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 3학년 영어 실무 평가 시스템 (1학기)</h1>

    <div class="section">
        <span class="section-title">1. 단원 및 영역 (기본 설정)</span>
        <div class="input-grid">
            <input type="text" id="name" placeholder="학생 이름">
            <select id="unit" onchange="load()">
                <option value="U1">1단원. Hello (인사)</option>
                <option value="U2">2단원. What's This? (사물)</option>
                <option value="U3">3단원. Stand Up (지시)</option>
                <option value="U4">4단원. How Many? (숫자)</option>
                <option value="U5">5단원. I Like Apples (음식)</option>
                <option value="U6">6단원. I Can Swim (운동)</option>
            </select>
            <select id="domain" onchange="load()">
                <option value="L">듣기</option>
                <option value="S">말하기</option>
                <option value="R">읽기</option>
                <option value="W">쓰기</option>
            </select>
        </div>
    </div>

    <div class="section" style="background:#fff;">
        <span class="section-title" style="color:#b45309; border-color:#b45309;">2. 세부 분류 (낱말/문장/대화/파닉스)</span>
        <select id="detailList"></select>
    </div>

    <div class="section">
        <span class="section-title">3. 학생 성취도</span>
        <div class="level-group">
            <button class="level-btn active" id="btn-H" onclick="setLvl('H')">잘함 (A)</button>
            <button class="level-btn" id="btn-M" onclick="setLvl('M')">보통 (B)</button>
            <button class="level-btn" id="btn-L" onclick="setLvl('L')">노력요함 (C)</button>
        </div>
    </div>

    <div class="section">
        <span class="section-title">4. 관찰된 학습 태도</span>
        <select id="att">
            <option value="수업에 적극적으로 참여하며 자신감 있게 영어로 표현하려는 태도가 돋보임.">적극성 및 자신감</option>
            <option value="친구들과 짝 활동이나 모둠 활동을 할 때 배려하고 협력하며 과제를 잘 수행함.">협력 및 배려</option>
            <option value="영어로 듣고 말하는 활동에 흥미를 느끼며 즐겁게 수업에 참여함.">흥미 및 즐거운 참여</option>
            <option value="기초를 익히기 위해 반복적으로 연습하며 꾸준히 노력하는 모습이 성실함.">성실한 연습 및 노력</option>
        </select>
    </div>

    <button class="btn-gen" onclick="make()">나이스(NEIS) 문장 생성</button>

    <div id="result-box">
        <textarea id="output" readonly placeholder="결과가 여기에 표시됩니다."></textarea>
        <div class="footer">
            <span style="font-weight:bold; color:#0f766e;">글자 수: <span id="byteVal">0</span> Byte</span>
            <button class="btn-copy" onclick="copy()">복사</button>
        </div>
    </div>
</div>

let curLvl = 'H';
function setLvl(l) { 
    curLvl = l; 
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active')); 
    document.getElementById('btn-'+l).classList.add('active'); 
}

function load() {
    const u = document.getElementById('unit').value, d = document.getElementById('domain').value, s = document.getElementById('detailList');
    s.innerHTML = "";
    if(DB[u] && DB[u][d]) {
        DB[u][d].forEach((item, i) => s.add(new Option(item.s, i)));
    } else {
        s.add(new Option("영역을 선택해주세요.", ""));
    }
}

function make() {
    const n = document.getElementById('name').value || "이 학생";
    const u = document.getElementById('unit').value;
    const d = document.getElementById('domain').value;
    const i = document.getElementById('detailList').value;
    const a = document.getElementById('att').value;
    
    if(!DB[u] || !DB[u][d] || i === "") return alert("세부 항목을 선택하세요.");
    
    const res = `${n} 학생은 ${DB[u][d][i][curLvl]} 또한 ${a}`;
    document.getElementById('output').value = res;
    document.getElementById('byteVal').innerText = [...res].reduce((acc, c) => acc + (c.charCodeAt(0) > 128 ? 3 : 1), 0);
}

function copy() { 
    const o = document.getElementById('output'); 
    if(!o.value) return; 
    o.select(); o.setSelectionRange(0, 99999); 
    document.execCommand('copy'); 
    alert("생기부 문장이 복사되었습니다."); 
}

window.onload = load;
