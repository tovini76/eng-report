<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3학년 1학기 시각화 평가 시스템</title>
    <style>
        :root { --primary: #047857; --accent: #ea580c; --bg: #f0fdf4; --card: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #334155; line-height: 1.6; }
        
        .container { max-width: 900px; margin: auto; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-top: 8px solid var(--primary); }
        
        /* 캐릭터 및 타이틀 영역 */
        .header-visual { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #e2e8f0; }
        .mascot { font-size: 3rem; background: #d1fae5; padding: 10px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text h1 { color: var(--primary); font-size: 1.5rem; margin: 0; letter-spacing: -0.5px; }
        .header-text p { margin: 5px 0 0 0; color: #64748b; font-size: 0.95rem; font-weight: 600; }
        .btn-home { margin-left: auto; background: #e2e8f0; color: #475569; padding: 10px 15px; border-radius: 10px; text-decoration: none; font-weight: 800; font-size: 0.95rem; transition: 0.2s; }

        .section { margin-bottom: 20px; padding: 18px; background: #f8fafc; border-radius: 14px; border: 1px solid #e2e8f0; }
        .section-title { font-weight: 800; color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-size: 1.05rem; }
        
        /* 단원 그림 영역 */
        .unit-visual-box { text-align: center; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 12px; border: 2px dashed #cbd5e1; }
        .unit-visual-box img { max-width: 100%; height: 120px; border-radius: 8px; object-fit: cover; }
        
        .input-grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
        @media (min-width: 600px) { .input-grid { grid-template-columns: 1fr 1fr; } }
        
        select, input, textarea { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.2s; background: #fff; font-weight: 600; }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(4, 120, 87, 0.1); }
        
        #detailList { font-weight: 700; color: #9a3412; border: 2px solid #fdba74; background: #fff7ed; }
        
        .level-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .level-btn { flex: 1; min-width: 30%; padding: 14px; border: 2px solid #cbd5e1; background: #fff; border-radius: 10px; cursor: pointer; font-weight: 800; color: #64748b; font-size: 1rem; }
        .level-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .btn-gen { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 1.15rem; font-weight: 800; cursor: pointer; margin-top: 15px; }
        
        #result-box { margin-top: 25px; background: #ecfdf5; padding: 20px; border-radius: 12px; border: 2px solid #6ee7b7; }
        textarea#output { background: transparent; border: none; height: 150px; font-size: 1.1rem; color: #064e3b; padding: 0; line-height: 1.8; font-weight: 500; resize: none; }
        
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid #a7f3d0; padding-top: 15px; }
        .byte { font-weight: 800; color: #9a3412; }
        .btn-copy { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-visual">
        <div class="mascot">👩‍🏫</div>
        <div class="header-text">
            <h1>3학년 1학기 평가</h1>
            <p>단원을 선택하면 관련 교과서 이미지가 표시됩니다.</p>
        </div>
        <a href="index.html" class="btn-home">🏠 메인</a>
    </div>

    <div class="section">
        <span class="section-title">📌 1. 단원 및 영역 설정</span>
        
        <div class="unit-visual-box">
            <img id="unitImage" src="https://placehold.co/400x150/e2e8f0/475569?text=Unit+1:+Hello" alt="단원 이미지">
        </div>

        <div class="input-grid">
            <input type="text" id="name" placeholder="학생 성명">
            <select id="unit" onchange="updateVisuals()">
                <option value="U1">1단원. Hello (인사/소개)</option>
                <option value="U2">2단원. What's This? (사물/명칭)</option>
                <option value="U3">3단원. Stand Up (지시/명령)</option>
            </select>
            <select id="domain" onchange="updateDetails()">
                <option value="L">👂 듣기 (Listening)</option>
                <option value="S">🗣️ 말하기 (Speaking)</option>
                <option value="R">📖 읽기 (Reading)</option>
                <option value="W">✍️ 쓰기 (Writing)</option>
            </select>
        </div>
    </div>

    <div class="section" style="background:#fff;">
        <span class="section-title" style="color:#ea580c;">🎯 2. 세부 평가 역량 (자동 연동)</span>
        <select id="detailList"></select>
    </div>

    <div class="section">
        <span class="section-title">⭐ 3. 성취 수준 판정</span>
        <div class="level-group">
            <button class="level-btn active" id="btn-H" onclick="setLvl('H')">매우 우수 (A)</button>
            <button class="level-btn" id="btn-M" onclick="setLvl('M')">보통/양호 (B)</button>
            <button class="level-btn" id="btn-L" onclick="setLvl('L')">기초 노력 (C)</button>
        </div>
    </div>

    <div class="section">
        <span class="section-title">💡 4. 구체적 관찰 활동 및 태도</span>
        <select id="activity" style="margin-bottom: 10px;">
            <option value="특히, 역할극(Role-play) 상황에서 배운 핵심 구문을 실감 나는 억양으로 응용하는 능력을 보여줌.">🎭 역할극(Role-play) 응용력 우수</option>
            <option value="특히, 챈트(Chant)와 노래 부르기 활동에 주도적으로 참여하며 영어 특유의 리듬을 자연스럽게 체득함.">🎵 챈트/노래 리듬감 체득</option>
            <option value="특히, 낱말 카드와 시각 자료를 활용한 정보 격차(Information Gap) 게임에서 뛰어난 순발력을 발휘함.">🎲 놀이/게임 정보 처리력 우수</option>
        </select>
        <select id="att">
            <option value="또한, 매 수업에 자기주도적으로 참여하며 자신감 있게 발화하려는 태도가 매우 훌륭함.">🔥 자기주도적 및 자신감</option>
            <option value="또한, 낯선 외국어 학습에 큰 흥미를 느끼며, 수업에 생기를 불어넣는 긍정적인 에너지를 가짐.">✨ 긍정적 흥미 및 도전 정신</option>
        </select>
    </div>

    <button class="btn-gen" onclick="make()">📝 생활기록부 장문 생성</button>

    <div id="result-box">
        <textarea id="output" readonly placeholder="결과가 이곳에 생성됩니다."></textarea>
        <div class="footer">
            <div class="byte">NEIS 기준: <span id="byteVal">0</span> Byte</div>
            <button class="btn-copy" onclick="copy()">클립보드 복사</button>
        </div>
    </div>
</div>

<script>
// 단원별 이미지 매핑 (실제 교과서 사진 URL이나 캡처본 링크로 교체하시면 됩니다)
const UNIT_IMAGES = {
    "U1": "https://placehold.co/400x150/d1fae5/047857?text=Unit+1:+Hello+(Greetings)",
    "U2": "https://placehold.co/400x150/dbeafe/1d4ed8?text=Unit+2:+What's+This+(Objects)",
    "U3": "https://placehold.co/400x150/fef3c7/b45309?text=Unit+3:+Stand+Up+(Commands)"
};

const DB = {
    "U1": { 
        "L": [{ s: "[음소 인식] 알파벳 A~M 음가 식별하기", H: "알파벳 A부터 M까지의 소리를 정확하게 구별하며, 청각적 식별력이 매우 탁월함.", M: "알파벳 A~M 소리를 구별하여 들으며, 익숙한 낱말 소리와 매칭하는 능력이 안정적임.", L: "알파벳 소리에 주의를 기울이며, 기본 음가를 구별하려고 노력함." }],
        "S": [{ s: "[구어 소통] 상황에 맞게 인사하고 자기소개하기", H: "상황에 맞는 인사말과 자기소개를 유창하게 발화함.", M: "자신의 이름을 소개하고 기본 인사말을 자신감 있게 표현함.", L: "짧은 인사말과 자신의 이름을 말하며 대화에 긍정적으로 참여함." }],
        "R": [{ s: "[시각적 문식성] 알파벳 A~M 식별하여 읽기", H: "알파벳 A~M 대소문자를 완벽히 인지하여 정확하게 소리 내어 읽음.", M: "대부분의 알파벳 A~M 대소문자를 혼동 없이 바르게 식별하여 읽음.", L: "대문자와 소문자를 대조하며 알파벳을 천천히 읽어보려 노력함." }],
        "W": [{ s: "[쓰기 기초] 알파벳 A~M 획순에 맞게 쓰기", H: "알파벳 A~M의 획순을 명확히 숙지하고 네 줄 선에 매우 정교하게 씀.", M: "알파벳 대소문자를 순서에 맞게 쓰며 과제를 성실하게 완수함.", L: "알파벳 모양을 관찰하고 천천히 베껴 쓰며 쓰기 기초를 다짐." }]
    },
    "U2": { 
        "L": [{ s: "[어휘 청해] 주변 사물 명칭 듣고 식별하기", H: "사물의 명칭을 듣고 대상을 즉각적으로 찾아내며 정보 처리 능력이 우수함.", M: "친숙한 사물의 이름을 듣고 시각 자료와 바르게 연결함.", L: "핵심 낱말의 첫소리에 단서를 두고 사물의 명칭을 파악하려고 꾸준히 집중함." }],
        "S": [{ s: "[정보 교환] 사물의 이름 묻고 답하기", H: "주변 사물을 가리키며 묻고 답하는 과정에서 매우 자연스럽게 의사소통함.", M: "사물을 보고 학습한 표현을 사용하여 묻고 답하는 활동에 능숙함.", L: "단어 수준에서 사물의 이름을 말하며 응답하려는 의지를 보임." }],
        "R": [{ s: "[시각적 문식성] 알파벳 N~Z 식별하여 읽기", H: "알파벳 N~Z 대소문자를 명확하게 구별하고 정확히 읽어냄.", M: "대부분의 알파벳 N~Z 대소문자를 정확히 식별하여 읽을 수 있음.", L: "철자의 모양을 식별하며 한 글자씩 소리 내어 읽으려 노력함." }],
        "W": [{ s: "[쓰기 기초] 알파벳 N~Z 획순에 맞게 쓰기", H: "알파벳 N~Z의 쓰는 순서를 완벽히 지키며 문자의 크기를 고려하여 깔끔하게 씀.", M: "알파벳 대문자와 소문자의 높낮이를 인지하여 순서대로 잘 씀.", L: "알파벳 모양을 보고 천천히 옮겨 적으며 쓰기 연습에 성실함." }]
    },
    "U3": {
        "L": [{ s: "[어휘 청해] 동작을 나타내는 동사 듣기", H: "상반되는 동작을 나타내는 동사들을 즉각적으로 구별하여 알맞은 행동을 찾아냄.", M: "동작 관련 기초 동사를 듣고 그 의미를 대체로 바르게 파악함.", L: "동작 낱말의 소리에 익숙해지려 노력하며 신체 반응 활동에 참여함." }],
        "S": [{ s: "[지시 발화] 적절한 억양으로 동작 지시하기", H: "상대방에게 명확한 강세와 억양으로 지시하거나 명령하는 말을 유창하게 구사함.", M: "학습한 동작 동사를 활용하여 짝에게 간단한 지시를 내림.", L: "동작 낱말을 소리 내어 말하며 짝과 지시하는 놀이에 즐겁게 참여함." }],
        "R": [{ s: "[어휘 독해] 동작 낱말 읽고 의미 파악하기", H: "동작을 나타내는 낱말을 보고 자연스럽게 읽어냄.", M: "학습한 동사 낱말을 소리 내어 읽고 행동 그림을 바르게 연결함.", L: "낱말의 첫 알파벳 소리를 단서로 동작 낱말을 천천히 읽어보려 함." }],
        "W": [{ s: "[철자 쓰기] 동작 낱말 베껴 쓰기", H: "동작을 나타내는 낱말을 철자 오류 없이 완벽하게 씀.", M: "학습한 동작 낱말을 네 줄 선에 맞추어 깔끔하고 바르게 베껴 씀.", L: "낱말 카드를 확인하며 한 글자씩 천천히 옮겨 적음." }]
    }
};

let curLvl = 'H';
function setLvl(l) { 
    curLvl = l; 
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active')); 
    document.getElementById('btn-'+l).classList.add('active'); 
}

// 단원 변경 시 그림과 세부 항목 동시 업데이트
function updateVisuals() {
    const u = document.getElementById('unit').value;
    
    // 그림 변경 로직
    const imgEl = document.getElementById('unitImage');
    if(UNIT_IMAGES[u]) {
        imgEl.src = UNIT_IMAGES[u];
    }
    
    updateDetails();
}

function updateDetails() {
    const u = document.getElementById('unit').value;
    const d = document.getElementById('domain').value;
    const s = document.getElementById('detailList');
    s.innerHTML = "";
    
    if(DB[u] && DB[u][d]) {
        DB[u][d].forEach((item, i) => s.add(new Option(item.s, i)));
    } else {
        s.add(new Option("해당 영역의 세부 항목이 없습니다.", ""));
    }
}

function make() {
    const n = document.getElementById('name').value || "이 학생";
    const u = document.getElementById('unit').value;
    const d = document.getElementById('domain').value;
    const i = document.getElementById('detailList').value;
    const act = document.getElementById('activity').value;
    const att = document.getElementById('att').value;
    
    if(!DB[u] || !DB[u][d] || i === "") return alert("세부 항목을 선택하세요.");
    
    const res = `${n} 학생은 ${DB[u][d][i][curLvl]} ${act} ${att}`;
    document.getElementById('output').value = res;
    
    document.getElementById('byteVal').innerText = [...res].reduce((acc, c) => acc + (c.charCodeAt(0) > 128 ? 3 : 1), 0);
}

function copy() { 
    const o = document.getElementById('output'); 
    if(!o.value) return; 
    o.select(); document.execCommand('copy'); 
    alert("시각화가 적용된 3학년 평가가 복사되었습니다!"); 
}

// 초기 실행 시 그림과 리스트 세팅
window.onload = updateVisuals;
</script>
</body>
</html>
