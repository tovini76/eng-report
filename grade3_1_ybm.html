<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3학년 1학기 평가 (YBM 김혜리)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { --primary: #047857; --accent: #059669; --bg: #f8fafc; --border: #cbd5e1; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; color: #334155; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: #ffffff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border-top: 6px solid var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .header h1 { color: var(--primary); font-size: 1.4rem; margin: 0; letter-spacing: -0.5px; }
        .btn-home { background: #f1f5f9; color: #475569; padding: 10px 16px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.95rem; border: 1px solid var(--border); transition: 0.2s; }
        .btn-home:hover { background: #e2e8f0; color: var(--primary); }
        .section { margin-bottom: 20px; }
        .section-title { font-weight: 800; color: var(--primary); margin-bottom: 12px; display: block; font-size: 1.05rem; }
        .section-title::before { content: "▪ "; color: var(--accent); }
        .input-grid { display: grid; gap: 12px; grid-template-columns: 1fr; margin-bottom: 15px; }
        @media (min-width: 600px) { .input-grid { grid-template-columns: 120px 1.5fr 1fr; } }
        select, input, textarea { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; transition: 0.2s; font-weight: 500; }
        select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
        #detailList { font-weight: 700; color: #064e3b; border-color: #34d399; background: #ecfdf5; margin-bottom: 15px; }
        .level-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .level-btn { flex: 1; min-width: 30%; padding: 14px; border: 1.5px solid var(--border); background: #fff; border-radius: 8px; cursor: pointer; font-weight: 700; color: #64748b; transition: 0.2s; }
        .level-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-gen { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-size: 1.15rem; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-gen:active { transform: scale(0.98); }
        .btn-gen:hover { background: var(--primary); }
        #result-box { margin-top: 25px; background: #f8fafc; padding: 20px; border-radius: 10px; border: 1.5px solid var(--border); }
        textarea#output { background: transparent; border: none; height: 140px; font-size: 1.05rem; color: #0f172a; padding: 0; line-height: 1.8; resize: none; width: 100%; }
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .byte { font-weight: 700; color: #475569; font-size: 0.95rem; }
        .byte span { color: var(--accent); font-weight: 800; font-size: 1.1rem; }
        .btn-copy { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎒 3학년 1학기 (YBM 김혜리)</h1>
        <a href="index.html" class="btn-home">메인으로 이동</a>
    </div>

    <div class="section">
        <span class="section-title">기본 정보 및 단원 설정</span>
        <div class="input-grid">
            <input type="text" id="name" placeholder="학생 성명">
            <select id="unit" onchange="updateDetails()">
                <option value="U1">1단원. Hello, I'm Dito. (인사/소개)</option>
                <option value="U2">2단원. Sit Down, Please. (지시/명령)</option>
                <option value="U3">3단원. What's This? (사물/명칭)</option>
                <option value="U4">4단원. I Like Pizza. (음식/선호)</option>
                <option value="U5">5단원. How Many Tigers? (동물/수량)</option>
                <option value="U6">6단원. Can You Swim? (능력/동작)</option>
            </select>
            <select id="domain" onchange="updateDetails()">
                <option value="L">듣기 (Listening)</option>
                <option value="S">말하기 (Speaking)</option>
                <option value="R">읽기 (Reading)</option>
                <option value="W">쓰기 (Writing)</option>
            </select>
        </div>
    </div>

    <div class="section">
        <span class="section-title">교육과정 세부 성취기준 (장학사급)</span>
        <select id="detailList"></select>
    </div>

    <div class="section">
        <span class="section-title">도입: 성취 수준 판정</span>
        <div class="level-group">
            <button class="level-btn active" id="btn-H" onclick="setLvl('H')">매우 우수 (A)</button>
            <button class="level-btn" id="btn-M" onclick="setLvl('M')">보통/양호 (B)</button>
            <button class="level-btn" id="btn-L" onclick="setLvl('L')">기초 노력 (C)</button>
        </div>
    </div>

    <div class="section">
        <span class="section-title">전개 및 결론: 관찰 활동 및 정의적 영역</span>
        <select id="activity" style="margin-bottom: 12px;">
            <option value="특히, 짝과 함께하는 대화(Role-play) 상황에서 배운 핵심 구문을 실감 나는 억양으로 적절히 응용함.">대화/역할극(Role-play) 응용력 우수</option>
            <option value="특히, 챈트(Chant)와 노래 부르기 활동에 주도적으로 참여하며 영어 특유의 리듬을 체득함.">챈트/노래 리듬감 체득</option>
            <option value="특히, 교실 놀이와 게임 활동에서 뛰어난 집중력과 순발력을 발휘하며 적극적으로 참여함.">수업 놀이/게임 참여도 우수</option>
            <option value="특히, 원어민 발음 및 멀티미디어 자료를 듣고 핵심 내용을 빠르게 유추하는 능력이 뛰어남.">매체 활용 듣기/이해 우수</option>
            <option value="특히, 알파벳과 단어를 쓰는 활동 시 바른 자세로 꼼꼼하게 과제를 완수하는 성실함이 돋보임.">알파벳/단어 쓰기 과제 성실성</option>
        </select>
        <select id="att">
            <option value="또한, 매 수업에 자기주도적으로 참여하며 오류를 두려워하지 않고 자신감 있게 발화하려는 태도가 훌륭함.">자기주도적 및 자신감</option>
            <option value="또한, 모둠 활동 시 급우들의 발화를 경청하고 협력적으로 활동에 임하는 의사소통 모습이 모범적임.">협력적 태도 및 경청</option>
            <option value="또한, 낯선 외국어 학습에 큰 흥미를 느끼며, 끊임없이 발화에 도전하는 긍정적인 학습 태도를 가짐.">긍정적 흥미 및 도전 정신</option>
            <option value="또한, 자신의 학습을 스스로 점검하고 기초를 다지기 위해 꾸준히 노력하는 등 발전 가능성이 높음.">학습 점검 및 자기 주도성</option>
        </select>
    </div>

    <button class="btn-gen" onclick="make()">평가 결과 장문 생성</button>

    <div id="result-box">
        <textarea id="output" readonly placeholder="NEIS 입력용 3단 콤보(성취기준 + 관찰활동 + 학습태도) 장문이 이곳에 출력됩니다."></textarea>
        <div class="footer">
            <div class="byte">NEIS 기준 바이트: <span id="byteVal">0</span> Byte</div>
            <button class="btn-copy" onclick="copy()">결과 복사</button>
        </div>
    </div>
</div>

<script>
// YBM 김혜리 3학년 1학기 (1~6단원) 장학사급 정밀 데이터베이스 완벽 이식
const DB = {
    "U1": { // Hello, I'm Dito.
        "L": [ 
            { s: "[음소 인식] 알파벳 음가 식별하기", H: "알파벳의 기초 음가를 명확히 인지하며, 낱말의 첫소리를 듣고 해당 철자를 구별하는 청각적 식별력이 탁월함.", M: "알파벳의 주요 소리를 구별하여 들으며, 익숙한 낱말 소리와 철자를 매칭하는 능력이 안정적임.", L: "반복되는 알파벳 소리에 주의를 기울이며, 교사의 도움을 받아 기본 음가를 구별하려고 노력함." },
            { s: "[담화 이해] 인사 및 자기소개 듣고 파악하기", H: "인사말과 자기소개를 듣고 음운적 차이와 담화의 상황적 맥락을 정확히 이해함.", M: "인사말과 소개를 듣고 대체로 바르게 파악하여 상황에 맞게 반응할 수 있음.", L: "인사말의 핵심 소리에 집중하며, 화자가 누구인지 상황을 이해하려 시도함." }
        ],
        "S": [ 
            { s: "[구어 소통] 상황에 맞게 인사하고 자신 소개하기", H: "상황에 맞는 인사말과 자신의 이름을 영어 고유의 억양과 강세를 살려 유창하게 발화함.", M: "학습한 문형을 바탕으로 기본 인사말과 자신의 이름을 무난하고 자연스럽게 표현함.", L: "교사의 시범을 따라 짧은 인사말을 따라 말하며 대화에 참여함." } 
        ],
        "R": [ 
            { s: "[시각적 문식성] 알파벳 대소문자 읽기", H: "알파벳 대소문자의 형태적 특징을 완벽히 인지하여, 소리와 문자를 연합해 정확하게 소리 내어 읽음.", M: "대부분의 알파벳 대소문자를 혼동 없이 바르게 식별하여 읽기 활동에 참여함.", L: "비슷한 모양의 대문자와 소문자를 대조하며 알파벳을 천천히 읽어보려 노력함." } 
        ],
        "W": [ 
            { s: "[쓰기 기초] 알파벳 획순에 맞게 쓰기", H: "알파벳의 획순과 방향을 명확히 숙지하고, 규격에 맞춰 대소문자를 매우 정교하게 씀.", M: "주어진 기준선을 참고하여 알파벳 대소문자를 순서에 맞게 쓰며 과제를 성실하게 완수함.", L: "알파벳 쓰기표를 보며 모양을 관찰하고 천천히 베껴 쓰며 쓰기 기초를 다짐." } 
        ]
    },
    "U2": { // Sit Down, Please.
        "L": [ 
            { s: "[어휘 청해] 동작 지시 동사 듣고 식별하기", H: "지시나 명령을 나타내는 핵심 동사들을 듣고 즉각적으로 구별하여 알맞은 행동을 찾아냄.", M: "동작 관련 기초 동사를 듣고 제스처 없이도 그 의미를 대체로 바르게 파악함.", L: "동작 낱말의 소리에 익숙해지려 노력하며 신체 반응 듣기 활동에 참여함." },
            { s: "[의미 구별] 지시하는 담화 듣고 이해하기", H: "정중한 지시의 말을 듣고 억양과 화자의 의도를 완벽히 파악하여 반응함.", M: "행동을 지시하는 말을 듣고 상황에 맞게 알맞은 동작을 취함.", L: "지시하는 소리에 귀 기울이며 짝의 행동을 보고 상황을 이해하려고 시도함." }
        ],
        "S": [ 
            { s: "[지시 발화] 적절한 억양으로 지시하기", H: "상대방에게 행동을 지시하는 말을 명확한 강세와 억양으로 유창하게 구사함.", M: "학습한 동작 동사를 활용하여 짝에게 간단한 지시를 내리고 상호작용함.", L: "지시하는 낱말을 소리 내어 말하며 짝과 함께하는 활동에 즐겁게 참여함." } 
        ],
        "R": [ 
            { s: "[어휘 독해] 지시 관련 낱말 읽기", H: "지시를 나타내는 동사 낱말을 보고 의미를 파악하여 자연스럽게 읽어냄.", M: "학습한 동작 낱말을 소리 내어 읽고 그에 알맞은 그림을 연결함.", L: "낱말의 첫 알파벳 소리를 단서로 지시 낱말을 천천히 읽어보려 함." } 
        ],
        "W": [ 
            { s: "[철자 쓰기] 지시 관련 낱말 베껴 쓰기", H: "지시 및 동작 낱말의 철자 체계를 정확히 이해하여 철자 오류 없이 완벽하게 씀.", M: "학습한 지시 낱말을 네 줄 선에 맞추어 깔끔하고 바르게 베껴 쓸 수 있음.", L: "낱말 카드를 확인하며 한 글자씩 천천히 옮겨 적고 과제에 임함." } 
        ]
    },
    "U3": { // What's This?
        "L": [ 
            { s: "[어휘 청해] 사물 명칭 듣고 식별하기", H: "여러 사물의 명칭을 듣고 대상을 즉각적으로 찾아내며, 정보 처리 능력이 우수함.", M: "친숙한 사물의 이름을 듣고 시각 자료와 바르게 연결하여 그 의미를 파악함.", L: "핵심 낱말의 첫소리에 단서를 두고 사물의 명칭을 파악하려고 꾸준히 집중함." },
            { s: "[구문 이해] 사물을 묻고 답하는 말 파악하기", H: "사물이 무엇인지 묻고 답하는 말을 듣고, 의문문과 평서문의 의미를 완벽히 이해함.", M: "사물을 묻는 질문을 듣고 상황을 파악하여 적절한 사물을 유추함.", L: "의문문 고유의 억양에 주의를 기울이며 대화 상황에 참여하려 함." }
        ],
        "S": [ 
            { s: "[정보 교환] 사물의 이름 묻고 답하기", H: "사물을 가리키며 묻고 답하는 상호작용 과정에서 매우 자연스럽게 의사소통함.", M: "제시된 사물을 보고 학습한 표현을 사용하여 짝과 함께 묻고 답하는 활동에 능숙함.", L: "사물의 이름을 말하며, 질문에 짧게 응답하려는 의지를 보임." } 
        ],
        "R": [ 
            { s: "[어휘 독해] 사물 관련 낱말 읽기", H: "학습한 사물 낱말을 명확하게 구별하고, 소리와 문자를 연합하여 정확히 읽어냄.", M: "사물을 나타내는 기초 낱말을 식별하여 무난하게 소리 내어 읽음.", L: "낱말의 첫 글자 모양을 식별하며 천천히 읽으려 노력함." } 
        ],
        "W": [ 
            { s: "[철자 쓰기] 사물 낱말 베껴 쓰기", H: "사물 낱말의 철자 구성을 인지하여 비율을 고려하여 매우 깔끔하게 씀.", M: "사물을 나타내는 낱말을 기준선에 맞게 성실히 베껴 씀.", L: "낱말 모양을 보고 천천히 옮겨 적으며 쓰기 연습에 성실함." } 
        ]
    },
    "U4": { // I Like Pizza.
        "L": [ 
            { s: "[어휘 청해] 음식 명칭 듣고 식별하기", H: "음식의 명칭을 듣고 음운을 식별하여 대상을 즉각적으로 찾아내며, 정보 처리 능력이 우수함.", M: "친숙한 음식의 이름을 듣고 그림 카드와 바르게 연결하여 그 의미를 파악함.", L: "핵심 낱말의 첫소리에 집중하며 음식의 명칭을 파악하려고 함." },
            { s: "[담화 이해] 선호(기호)를 나타내는 말 파악하기", H: "좋아하는 음식을 나타내는 말을 듣고 긍정과 부정의 의미를 완벽하게 구별하여 이해함.", M: "음식을 나타내는 대화를 듣고 화자가 좋아하는 것을 대체로 바르게 유추함.", L: "기호를 나타내는 핵심 동사에 주의를 기울이며 대화에 참여하려 함." }
